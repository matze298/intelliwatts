<!DOCTYPE html>
<html>
<head>
    <title>Secrets</title>
    <link rel="stylesheet" id="theme-stylesheet" href="/static/tailwind-retro.css">
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">Home</a>
            {% if user %}
                <a href="/secrets">Secrets</a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
            <select id="theme-switcher" class="bg-gray-800 text-pink-500 border border-pink-500 rounded px-2 py-1 ml-4">
                <option value="retro">Retro90s</option>
                <option value="minimal">Minimalistic</option>
            </select>
        </div>
        <h1>🤫 Store Secrets</h1>
        <form id="secretsForm">
            <label for="athlete_id">intervals.icu Athlete ID:</label>
            <input type="text" id="athlete_id" name="athlete_id" required>
            <br>
            <label for="intervals_api_key">intervals.icu API Key:</label>
            <input type="password" id="intervals_api_key" name="intervals_api_key" required>
            <br>
            <label for="openai_api_key">OpenAI API Key:</label>
            <input type="password" id="openai_api_key" name="openai_api_key">
            <br>
            <label for="gemini_api_key">Gemini API Key:</label>
            <input type="password" id="gemini_api_key" name="gemini_api_key">
            <br>
            <button type="submit">Store Secrets</button>
        </form>
        <p id="message"></p>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeStylesheet = document.getElementById('theme-stylesheet');
            const themeSwitcher = document.getElementById('theme-switcher');

            // Load saved theme from localStorage, default to 'retro'
            const savedTheme = localStorage.getItem('selectedTheme') || 'retro';
            themeSwitcher.value = savedTheme;
            updateTheme(savedTheme);

            themeSwitcher.addEventListener('change', (event) => {
                const selectedTheme = event.target.value;
                localStorage.setItem('selectedTheme', selectedTheme);
                updateTheme(selectedTheme);
            });

            function updateTheme(theme) {
                if (theme === 'retro') {
                    themeStylesheet.href = '/static/tailwind-retro.css';
                } else if (theme === 'minimal') {
                    themeStylesheet.href = '/static/tailwind-minimal.css';
                }
            }
        });
    </script>
</body>
</html>
