<!DOCTYPE html>
<html>

<head>
    <title>Secrets - IntelliWatts</title>
    <link rel="stylesheet" id="theme-stylesheet" href="/static/tailwind-pro.css">
</head>

<body class="font-sans">
    <div class="container max-w-3xl mx-auto p-8 rounded-lg shadow-md mt-10">
        <nav class="flex justify-between items-center mb-6">
            <div>
                <a href="/" class="text-blue-600 hover:text-blue-800 mr-4">Home</a>
                <a href="/dashboard" class="text-blue-600 hover:text-blue-800 mr-4">Dashboard</a>
            </div>
            <div>
                {% if user %}
                <a href="/secrets" class="text-blue-600 hover:text-blue-800 mr-4">Secrets</a>
                <a href="/logout" class="text-blue-600 hover:text-blue-800">Logout</a>
                {% endif %}
                <select id="theme-switcher"
                    class="bg-gray-800 text-pink-500 border border-pink-500 rounded px-2 py-1 ml-4">
                    <option value="pro">Professional</option>
                    <option value="retro">Retro90s</option>
                    <option value="minimal">Minimalistic</option>
                </select>
            </div>
        </nav>

        <h1 class="text-3xl font-bold text-gray-800 mb-6">🤫 Store Secrets</h1>
        <form id="secretsForm" class="space-y-4">
            <div>
                <label for="athlete_id" class="block text-sm font-medium text-gray-700">intervals.icu Athlete
                    ID:</label>
                <input type="text" id="athlete_id" name="athlete_id" required
                    class="mt-1 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
            </div>
            <div>
                <label for="intervals_api_key" class="block text-sm font-medium text-gray-700">intervals.icu API
                    Key:</label>
                <input type="password" id="intervals_api_key" name="intervals_api_key" required
                    class="mt-1 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
            </div>
            <div>
                <label for="openai_api_key" class="block text-sm font-medium text-gray-700">OpenAI API Key:</label>
                <input type="password" id="openai_api_key" name="openai_api_key"
                    class="mt-1 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
            </div>
            <div>
                <label for="gemini_api_key" class="block text-sm font-medium text-gray-700">Gemini API Key:</label>
                <input type="password" id="gemini_api_key" name="gemini_api_key"
                    class="mt-1 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
            </div>
            <button type="submit"
                class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Store
                Secrets</button>
        </form>
        <p id="message" class="mt-4 text-sm font-medium"></p>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeStylesheet = document.getElementById('theme-stylesheet');
            const themeSwitcher = document.getElementById('theme-switcher');

            // Load saved theme from localStorage, default to 'pro'
            const savedTheme = localStorage.getItem('selectedTheme') || 'pro';
            themeSwitcher.value = savedTheme;
            updateTheme(savedTheme);

            themeSwitcher.addEventListener('change', (event) => {
                const selectedTheme = event.target.value;
                localStorage.setItem('selectedTheme', selectedTheme);
                updateTheme(selectedTheme);
            });

            function updateTheme(theme) {
                if (theme === 'pro') {
                    themeStylesheet.href = '/static/tailwind-pro.css';
                } else if (theme === 'retro') {
                    themeStylesheet.href = '/static/tailwind-retro.css';
                } else if (theme === 'minimal') {
                    themeStylesheet.href = '/static/tailwind-minimal.css';
                }
            }

            const secretsForm = document.getElementById('secretsForm');
            const message = document.getElementById('message');

            secretsForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(secretsForm);
                const data = Object.fromEntries(formData.entries());

                try {
                    const response = await fetch('/api/secrets', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data),
                    });

                    if (response.ok) {
                        message.textContent = 'Secrets stored successfully!';
                        message.className = 'mt-4 text-sm font-medium text-green-600';
                    } else {
                        message.textContent = 'Failed to store secrets.';
                        message.className = 'mt-4 text-sm font-medium text-red-600';
                    }
                } catch (error) {
                    message.textContent = 'An error occurred.';
                    message.className = 'mt-4 text-sm font-medium text-red-600';
                }
            });
        });
    </script>
</body>

</html>
