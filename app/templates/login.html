<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" id="theme-stylesheet" href="/static/tailwind-pro.css">
</head>

<body>
    <div class="container">
        <div class="nav">
            <a href="/">Home</a>
            {% if user %}
            <a href="/secrets">Secrets</a>
            <a href="/logout">Logout</a>
            {% else %}
            <a href="/login">Login</a>
            {% endif %}
            <select id="theme-switcher" class="bg-gray-800 text-pink-500 border border-pink-500 rounded px-2 py-1 ml-4">
                <option value="pro">Professional</option>
                <option value="retro">Retro90s</option>
                <option value="minimal">Minimalistic</option>
            </select>
        </div>
        <h1>🚴 Login</h1>
        <form action="/login" method="post">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br>
            <button type="submit">Login</button>
        </form>
        {% if error %}
        <p style="color: red;">{{ error }}</p>
        {% endif %}
        <p>Don't have an account? <a href="/register">Register here</a>.</p>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeStylesheet = document.getElementById('theme-stylesheet');
            const themeSwitcher = document.getElementById('theme-switcher');

            // Load saved theme from localStorage, default to 'pro'
            const savedTheme = localStorage.getItem('selectedTheme') || 'pro';
            themeSwitcher.value = savedTheme;
            updateTheme(savedTheme);

            themeSwitcher.addEventListener('change', (event) => {
                const selectedTheme = event.target.value;
                localStorage.setItem('selectedTheme', selectedTheme);
                updateTheme(selectedTheme);
            });

            function updateTheme(theme) {
                if (theme === 'pro') {
                    themeStylesheet.href = '/static/tailwind-pro.css';
                } else if (theme === 'retro') {
                    themeStylesheet.href = '/static/tailwind-retro.css';
                } else if (theme === 'minimal') {
                    themeStylesheet.href = '/static/tailwind-minimal.css';
                }
            }
        });
    </script>
</body>

</html>
