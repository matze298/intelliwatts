<!-- app/templates/widgets/activity_type_chart.html -->
<div class="p-8 rounded-lg shadow bg-slate-500 bg-opacity-10 border border-slate-700 space-y-6">
    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 italic uppercase">🏅 Sport Distribution</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400">Training volume: <span class="font-bold text-slate-700 dark:text-slate-200">{{ widget.data.total_hours | round(1) }}h total</span></p>
        </div>
    </div>

    <div class="flex flex-col sm:flex-row items-center justify-around gap-8 py-4">
        <!-- Pie Chart -->
        <div class="relative w-48 h-48 flex-shrink-0">
            <canvas id="typeChart"></canvas>
        </div>

        <!-- Custom Legend -->
        <div id="typeLegend" class="flex flex-col gap-2 min-w-[120px]">
            <!-- Generated by JS -->
        </div>
    </div>
</div>

<script>
    (function() {
        const data = {{ widget.data | tojson }};
        const ctx = document.getElementById('typeChart').getContext('2d');
        
        // More unique and distinct color palette
        const uniqueColors = [
            '#f59e0b', // Amber
            '#ef4444', // Red
            '#8b5cf6', // Violet
            '#06b6d4', // Cyan
            '#f97316', // Orange
            '#d946ef', // Fuchsia
            '#14b8a6', // Teal
            '#6366f1'  // Indigo
        ];

        const chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: data.labels,
                datasets: [{
                    data: data.values,
                    backgroundColor: uniqueColors.slice(0, data.labels.length),
                    borderWidth: 2,
                    borderColor: 'rgba(30, 41, 59, 0.5)',
                    hoverOffset: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        enabled: true,
                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                        padding: 12,
                        cornerRadius: 8,
                        callbacks: {
                            label: function(context) {
                                return ` ${context.label}: ${context.raw}h`;
                            }
                        }
                    }
                }
            }
        });

        // Generate Custom Legend
        const legendContainer = document.getElementById('typeLegend');
        data.labels.forEach((label, index) => {
            const item = document.createElement('div');
            item.className = 'flex items-center gap-3 group cursor-default';
            
            const colorBox = document.createElement('span');
            colorBox.className = 'w-3 h-3 rounded-full transition-transform group-hover:scale-125';
            colorBox.style.backgroundColor = uniqueColors[index];
            
            const text = document.createElement('span');
            text.className = 'text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-tight';
            text.textContent = label;

            const val = document.createElement('span');
            val.className = 'text-[10px] text-slate-400 ml-auto tabular-nums';
            val.textContent = data.values[index] + 'h';
            
            item.appendChild(colorBox);
            item.appendChild(text);
            item.appendChild(val);
            legendContainer.appendChild(item);
        });
    })();
</script>
