<!-- app/templates/widgets/intensity_chart.html -->
<div class="p-8 rounded-lg shadow bg-slate-500 bg-opacity-10 border border-slate-700 space-y-8">
    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 italic uppercase">🔥 Training Intensity</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400">Time-in-zone distribution and style.</p>
        </div>
        <div class="flex bg-slate-100 dark:bg-slate-700 p-1 rounded-lg">
            <button id="toggle-hr" onclick="updateIntensityChart('hr')" class="px-3 py-1 text-xs font-bold rounded-md transition-all bg-white dark:bg-slate-600 shadow-sm text-blue-600 dark:text-blue-400">HR</button>
            <button id="toggle-power" onclick="updateIntensityChart('power')" class="px-3 py-1 text-xs font-bold rounded-md transition-all text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200">Power</button>
        </div>
    </div>

    <!-- Centered Doughnut -->
    <div class="flex flex-col items-center justify-center space-y-8 py-4">
        <div class="relative w-56 h-56 flex-shrink-0">
            <canvas id="intensityChart"></canvas>
            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                <span id="center-style" class="text-[10px] font-black uppercase text-slate-400 tracking-tight">Style</span>
                <span id="center-score" class="text-2xl font-black text-slate-800 dark:text-white leading-none">0%</span>
            </div>
        </div>

        <div class="w-full max-w-lg space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="bg-blue-500/10 border border-blue-500/20 p-4 rounded-2xl">
                    <h3 class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 mb-1 tracking-wider">Training Style (Power)</h3>
                    <p id="style-text" class="text-base font-bold text-slate-800 dark:text-slate-100">{{ widget.data.style }}</p>
                </div>
                <div class="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-2xl">
                    <h3 class="text-[10px] font-black uppercase text-emerald-600 dark:text-emerald-400 mb-1 tracking-wider">Polarized Score (Power)</h3>
                    <p id="score-text" class="text-base font-bold text-slate-800 dark:text-slate-100">{{ widget.data.polarized_score | round(1) }}%</p>
                </div>
            </div>
            
            <div id="ss-container" class="hidden bg-pink-500/10 border border-pink-500/20 p-4 rounded-2xl transition-all">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-[10px] font-black uppercase text-pink-600 dark:text-pink-400 mb-1 tracking-wider">Sweet Spot (Z8)</h3>
                        <p class="text-xs text-slate-500 dark:text-slate-400">Overlaps with Z3/Z4. Excluded from total.</p>
                    </div>
                    <p class="text-lg font-black text-pink-500">{{ widget.data.power_ss | round(1) }}%</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const ctx = document.getElementById('intensityChart').getContext('2d');
        const hrData = {{ widget.data.hr_zones | tojson }};
        const powerData = {{ widget.data.power_zones | tojson }};
        const style = "{{ widget.data.style }}";
        const score = {{ widget.data.polarized_score }};
        
        const labels = ['Z1', 'Z2', 'Z3', 'Z4', 'Z5', 'Z6', 'Z7', 'Z9', 'Z10'];
        const colors = [
            '#94a3b8', '#3b82f6', '#22c55e', '#eab308', '#f97316', '#ef4444', '#7f1d1d', '#4c0519', '#1e1b4b'
        ];

        window.intensityChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels.slice(0, hrData.length),
                datasets: [{
                    data: hrData,
                    backgroundColor: colors.slice(0, hrData.length),
                    borderWidth: 0,
                    hoverOffset: 6,
                    cutout: '80%'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        enabled: true,
                        callbacks: {
                            label: function(context) {
                                return ` ${context.label}: ${context.raw}%`;
                            }
                        }
                    }
                }
            }
        });

        const updateCenter = (displayText, currentScore) => {
            document.getElementById('center-style').textContent = displayText;
            document.getElementById('center-score').textContent = Math.round(currentScore) + '%';
        };

        updateCenter(style.split(' ')[0], score);

        window.updateIntensityChart = function(type) {
            const data = type === 'hr' ? hrData : powerData;
            const btnHr = document.getElementById('toggle-hr');
            const btnPower = document.getElementById('toggle-power');
            const ssContainer = document.getElementById('ss-container');

            if (type === 'hr') {
                btnHr.className = "px-3 py-1 text-xs font-bold rounded-md transition-all bg-white dark:bg-slate-600 shadow-sm text-blue-600 dark:text-blue-400";
                btnPower.className = "px-3 py-1 text-xs font-bold rounded-md transition-all text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200";
                ssContainer.classList.add('hidden');
            } else {
                btnPower.className = "px-3 py-1 text-xs font-bold rounded-md transition-all bg-white dark:bg-slate-600 shadow-sm text-blue-600 dark:text-blue-400";
                btnHr.className = "px-3 py-1 text-xs font-bold rounded-md transition-all text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200";
                ssContainer.classList.remove('hidden');
            }

            window.intensityChart.data.labels = labels.slice(0, data.length);
            window.intensityChart.data.datasets[0].data = data;
            window.intensityChart.data.datasets[0].backgroundColor = colors.slice(0, data.length);
            window.intensityChart.update();
            
            // Always show power-based style in center as per refined logic
            updateCenter(style.split(' ')[0], score);
        };
    })();
</script>
